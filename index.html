<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER Strategic Audit Hub | Master V16 Stealth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --surface-hover: rgba(31, 41, 55, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
            --neon-green: #10b981;
            --neon-red: #ef4444;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
        
        body { 
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, var(--bg) 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .blob {
            position: fixed; top: -100px; right: -100px;
            width: 400px; height: 400px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.05; } to { opacity: 0.15; } }

        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }

        header { 
            margin-bottom: 4rem; 
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .eyebrow { 
            font-family: 'Outfit'; 
            font-weight: 700; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            color: var(--accent); 
            margin-bottom: 1rem; 
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        h1 { 
            font-family: 'Outfit'; 
            font-size: clamp(2.5rem, 5vw, 4rem); 
            font-weight: 800; 
            letter-spacing: -0.04em; 
            line-height: 1; 
            margin-bottom: 1.5rem; 
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lead { 
            font-size: 1.1rem; 
            color: var(--text-sub); 
            max-width: 600px; 
            margin: 0 auto;
            line-height: 1.6;
        }

        .portfolio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 2rem; 
        }

        .product-card { 
            background: var(--surface); 
            backdrop-filter: blur(12px);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 2rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover { 
            border-color: rgba(59, 130, 246, 0.4); 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            background: var(--surface-hover);
        }

        .icon-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 2rem; 
        }

        .icon-inner { 
            width: 52px; height: 52px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--accent);
        }

        .tag { 
            padding: 0.4rem 0.8rem; 
            border-radius: 8px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text-sub); 
            border: 1px solid var(--border); 
            text-transform: uppercase;
        }

        .product-title { 
            font-family: 'Outfit'; 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: #fff; 
            margin-bottom: 0.5rem; 
        }

        .product-id { 
            font-family: 'JetBrains Mono'; 
            font-size: 0.7rem; 
            color: var(--accent); 
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
        }

        .status-box { 
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            flex: 1;
        }

        .status-label {
            font-family: 'JetBrains Mono';
            font-size: 0.55rem;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .status-text {
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            color: var(--neon-green);
        }

        .card-footer { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 0.8rem; 
            font-weight: 600; 
            color: var(--text-sub); 
        }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(3, 7, 18, 0.9); 
            backdrop-filter: blur(12px); 
            z-index: 2000; 
            display: none; 
            align-items: center; justify-content: center; 
            opacity: 0; transition: all 0.4s; 
        }
        
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content { 
            background: #0f172a; 
            width: 95%; max-width: 800px; max-height: 90vh; 
            border-radius: 32px; 
            position: relative; 
            border: 1px solid var(--border); 
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8); 
            overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        .modal-header { 
            padding: 2rem 3rem; 
            border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .m-info h2 { font-family: 'Outfit'; font-size: 1.75rem; font-weight: 800; color: #fff; }
        
        .modal-body { 
            flex: 1; overflow-y: auto; padding: 3rem; color: #e2e8f0; line-height: 1.7; font-size: 1rem;
        }

        .report-wrap h1 { font-family: 'Outfit'; font-size: 2.5rem; color: #fff; margin-bottom: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 1rem; }
        .report-wrap h2 { font-family: 'Outfit'; font-size: 1.5rem; color: var(--accent); margin: 3rem 0 1rem; border-left: 4px solid var(--accent); padding-left: 1rem; }
        
        .report-wrap table { 
            width: 100%; border-collapse: collapse; margin: 2rem 0; 
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
        }
        .report-wrap th, .report-wrap td { padding: 1rem; border: 1px solid var(--border); text-align: left; }
        .report-wrap th { background: rgba(59, 130, 246, 0.1); color: #fff; }

        .modal-footer { 
            padding: 1.5rem 3rem; border-top: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn { 
            padding: 0.75rem 1.5rem; border-radius: 14px; font-size: 0.9rem; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; gap: 0.75rem; border: none; transition: 0.3s;
        }
        
        .btn-ghost { background: transparent; color: var(--text-sub); border: 1px solid var(--border); }
        .btn-primary { background: var(--accent); color: #fff; }

        .close-trigger { 
            background: rgba(255, 255, 255, 0.05); color: var(--text-sub); 
            width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .error-card {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
        }

        footer { 
            margin-top: 6rem; padding: 4rem 0; text-align: center; color: var(--text-sub); font-size: 0.8rem; 
            border-top: 1px solid var(--border); 
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="container">
        <header>
            <span class="eyebrow">AETHER Engineering Masters v16</span>
            <h1>Strategic Asset Status</h1>
            <p class="lead">Universal intelligence hub for our core technical assets. Monitoring baseline status and classified audit reflection.</p>
        </header>

        <div class="portfolio-grid" id="portfolio-grid"></div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="m-info"><h2 id="mTitle">Master Strategic Audit</h2></div>
                <button class="close-trigger" onclick="closeModal()"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="report-wrap" id="reportView"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Close Audit</button>
                <button id="downloadBtn" class="btn btn-primary">
                    <i data-lucide="download"></i> Download status (.md)
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 AETHER SYSTEMS | CLASSIFIED // TOP SECRET</p>
    </footer>

    <script id="reports-meta" type="application/json">
        [
            { "id": "agency_hub", "name": "Agency Hub", "status": "LIVE - V16.4 Core", "icon": "briefcase", "tier": "Tier V.2" },
            { "id": "roleease", "name": "RoleEase", "status": "LIVE - Stealth Grid V4", "icon": "target", "tier": "Tier 1" },
            { "id": "skillease", "name": "SkillEase", "status": "LIVE - Worker Plane V16", "icon": "zap", "tier": "Tier 1" },
            { "id": "esign_pro", "name": "E-Sign Pro", "status": "LIVE - Velocity-TE", "icon": "file-check", "tier": "Tier 1" },
            { "id": "employee_ems", "name": "Employee EMS", "status": "LIVE - Trajectory-X", "icon": "users", "tier": "Tier 2" },
            { "id": "invenpilot", "name": "Invenpilot", "status": "LIVE - Atomic Lock V2", "icon": "box", "tier": "Tier 1" },
            { "id": "lifeflow", "name": "LifeFlow", "status": "LIVE - Neural Sync V1", "icon": "activity", "tier": "Tier 1" },
            { "id": "prochat", "name": "ProChat", "status": "LIVE - Signal Vault V4", "icon": "shield", "tier": "Tier 1" },
            { "id": "meet_app", "name": "Meet App", "status": "LIVE - ITT-Engine V4", "icon": "video", "tier": "Tier 0" }
        ]
    </script>

    <script>
        const reportsMeta = JSON.parse(document.getElementById('reports-meta').textContent);
        const grid = document.getElementById('portfolio-grid');

        reportsMeta.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openReport(index);
            card.innerHTML = `
                <div class="icon-header">
                    <div class="icon-inner"><i data-lucide="${item.icon}"></i></div>
                    <div class="tag">${item.tier}</div>
                </div>
                <div class="product-title">${item.name}</div>
                <div class="product-id">ID: ${item.id.toUpperCase()}</div>
                <div class="status-box">
                    <span class="status-label">Operational Status</span>
                    <div class="status-text">${item.status}</div>
                </div>
                <div class="card-footer">
                    <span>Initiate Audit</span>
                    <i data-lucide="arrow-right"></i>
                </div>
            `;
            grid.appendChild(card);
        });
        
        lucide.createIcons();

        function mdToHtml(md) {
            if (!md) return "No data available.";
            
            let html = md
                // Titles
                .replace(/^# (.*$)/gim, '<h1 style="color:#fff; font-family:Outfit; font-size:2.2rem; border-bottom:2px solid var(--accent); padding-bottom:1rem; margin-bottom:2rem;">$1</h1>')
                .replace(/^## (.*$)/gim, '<h2 style="color:var(--accent); font-family:Outfit; font-size:1.4rem; margin-top:2.5rem; margin-bottom:1rem; display:flex; align-items:center; gap:10px;"><span style="width:4px; height:1.4rem; background:var(--accent); display:inline-block; border-radius:10px;"></span>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3 style="color:#94a3b8; font-family:Outfit; font-size:1.1rem; margin-top:1.5rem; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.05em;">$1</h3>')
                
                // Bold & Emphasis
                .replace(/\*\*\*(.*)\*\*\*/gim, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*)\*\*/gim, '<strong style="color:#fff;">$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                
                // Code blocks
                .replace(/`(.*?)`/gim, '<code style="background:rgba(0,0,0,0.3); color:var(--neon-green); padding:2px 6px; border-radius:4px; font-family:JetBrains Mono; font-size:0.85rem; border:1px solid var(--border);">$1</code>');

            // Complex blocks (Lists, Tables)
            const lines = html.split('\n');
            let result = [];
            let inList = false;
            let inTable = false;
            let tableRows = [];

            lines.forEach(line => {
                const trimmed = line.trim();

                // Table Logic
                if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
                    if (!inTable) {
                        inTable = true;
                        tableRows = ['<div style="overflow-x:auto; margin:2rem 0;"><table style="width:100%; border-collapse:collapse; background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:12px;">'];
                    }
                    if (!trimmed.includes('---')) {
                        const cells = trimmed.split('|').filter(c => c.length > 0);
                        const rowType = tableRows.length === 1 ? 'th' : 'td';
                        let row = '<tr>';
                        cells.forEach(c => row += `<${rowType} style="padding:1rem; border:1px solid var(--border); text-align:left; font-size:0.9rem; ${rowType==='th'?'background:rgba(59,130,246,0.1); color:#fff; font-weight:700;':'' }">${c.trim()}</${rowType}>`);
                        row += '</tr>';
                        tableRows.push(row);
                    }
                    return;
                } else if (inTable) {
                    inTable = false;
                    tableRows.push('</table></div>');
                    result.push(tableRows.join(''));
                    tableRows = [];
                }

                // List Logic
                if (trimmed.match(/^([*-]|\d+\.) /)) {
                    if (!inList) {
                        inList = true;
                        result.push('<ul style="margin:1rem 0 1rem 1.5rem; list-style-type:none;">');
                    }
                    const content = trimmed.replace(/^([*-]|\d+\.) /, '');
                    result.push(`<li style="position:relative; margin-bottom:0.5rem; color:#cbd5e1; padding-left:1.5rem;"><span style="position:absolute; left:0; color:var(--accent);">▹</span>${content}</li>`);
                    return;
                } else if (inList) {
                    inList = false;
                    result.push('</ul>');
                }

                if (trimmed === "") {
                    result.push('<div style="height:0.5rem"></div>');
                } else {
                    result.push(`<p style="margin-bottom:1rem; color:#cbd5e1; line-height:1.7;">${line}</p>`);
                }
            });

            return result.join('');
        }

        async function openReport(index) {
            const meta = reportsMeta[index];
            const fileName = `${meta.id}_report.md`;
            
            document.getElementById('mTitle').innerHTML = `
                <div style="display:flex; align-items:center; gap:20px;">
                    <div style="width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff;">
                        <i data-lucide="${meta.icon}" style="width:20px;"></i>
                    </div>
                    <div>
                        <div style="font-size:1.2rem; font-weight:800; color:#fff;">${meta.name}</div>
                        <div style="font-family:JetBrains Mono; font-size:0.6rem; color:var(--text-sub); text-transform:uppercase;">Technical Audit Trace // VERIFIED: 2026-03-20</div>
                    </div>
                </div>
            `;
            
            document.getElementById('reportView').innerHTML = `
                <div style="padding: 10rem 0; text-align: center; color: var(--text-sub);">
                    <i data-lucide="loader-2" class="spin" style="width: 48px; height: 48px; margin-bottom: 2rem; color: var(--accent);"></i>
                    <p style="font-family: 'JetBrains Mono'; color:#fff; letter-spacing:0.2em; font-size:0.8rem;">ESTABLISHING_SECURE_LINK...</p>
                    <p style="font-family: 'JetBrains Mono'; font-size:0.6rem; margin-top:0.5rem; opacity:0.5;">DECRYPTING: ${fileName.toUpperCase()}</p>
                </div>
            `;
            lucide.createIcons();
            
            document.getElementById('overlay').classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error(`ERR_FS_${response.status}`);
                let rawMd = await response.text();
                
                // SURGICAL REDACTION (Only remove the content of section 10 and 30, not everything after)
                // Redact section 10
                rawMd = rawMd.replace(/^## 10\..*?(\n## |$)/ms, '## 10. [RESTRICTED]\nStrategy regarding future maneuvers is classified at Level 5.\n\n## ');
                // Redact section 30
                rawMd = rawMd.replace(/^## 30\..*?(\n## |$)/ms, '## 30. [RESTRICTED]\nExecutive Roadmap is behind an additional layer of tactical encryption.\n\n## ');

                document.getElementById('reportView').innerHTML = mdToHtml(rawMd);
                lucide.createIcons();
                
                document.getElementById('downloadBtn').onclick = () => {
                    const blob = new Blob([rawMd], { type: 'text/markdown' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = meta.id + '_audit_trace.md';
                    a.click();
                    URL.revokeObjectURL(url);
                };
            } catch (err) {
                document.getElementById('reportView').innerHTML = `
                    <div class="error-card">
                        <i data-lucide="shield-alert" style="width: 80px; height: 80px; margin-bottom: 2rem; color: var(--neon-red);"></i>
                        <h3 style="font-family: 'Outfit'; font-size: 2rem; color: #fff; margin-bottom: 1.5rem;">CORS_RESTRICTION_PROTOCOL</h3>
                        <p style="color: var(--text-sub); margin-bottom: 2.5rem; font-family: 'JetBrains Mono'; max-width:500px; margin-left:auto; margin-right:auto;">
                            The browser has blocked direct file read. To unlock the live audit logic, the hub must be initialized via a server node.
                        </p>
                        <div style="background: rgba(0,0,0,0.6); padding: 2rem; border-radius: 20px; text-align: left; margin-bottom: 2.5rem; border: 1px solid var(--border); border-left: 6px solid var(--accent);">
                            <p style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: #fff; margin-bottom: 1rem; opacity:0.7;">> INITIATE_SERVER:</p>
                            <code style="color: var(--accent); font-size: 1rem; font-family:JetBrains Mono; font-weight:700;">npx serve .</code>
                        </div>
                        <p style="font-size: 0.85rem; color: var(--text-sub);">
                            Run the command above in your terminal folder to bypass local security.
                        </p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
